name: Upload Zip to Google Drive

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  deploy-to-drive:
    runs-on: windows-latest

    env:
      # Replace 'your-file-name.zip' with the actual name of the zip file in your repo
      FINAL_ZIP_PATH: "trackright.zip"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Verify File Existence
        shell: pwsh
        run: |
          if (Test-Path env:FINAL_ZIP_PATH) {
            Write-Host "File found: $env:FINAL_ZIP_PATH"
          } else {
            Write-Error "File not found at $env:FINAL_ZIP_PATH. Please check the file name."
            exit 1
          }

      - name: Upload to Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.3
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          target: ${{ env.FINAL_ZIP_PATH }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
