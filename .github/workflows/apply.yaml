name: Upload Zip to Google Drive

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ── Job 1: Windows — checkout and verify the ZIP exists ──────────────────
  verify-zip:
    runs-on: windows-latest
    env:
      FINAL_ZIP_PATH: "trackright-Automation-Test-results-16-Mar-2026-12-48PM.zip"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install google-auth google-api-python-client

      - name: Verify File Existence
        shell: pwsh
        run: |
          if (Test-Path $env:FINAL_ZIP_PATH) {
            Write-Host "File found: $env:FINAL_ZIP_PATH"
          } else {
            Write-Error "File not found at $env:FINAL_ZIP_PATH. Please check the file name."
            exit 1
          }

      # ── Hand off the ZIP to the upload job ────────────────────────────────
      - name: Upload ZIP artifact for Drive job
        uses: actions/upload-artifact@v4
        with:
          name: drive-upload-zip
          path: ${{ env.FINAL_ZIP_PATH }}

  # ── Job 2: Ubuntu — upload to Google Drive ───────────────────────────────
  upload-to-drive:
    runs-on: ubuntu-latest
    needs: verify-zip
    if: ${{ always() && needs.verify-zip.result != 'cancelled' }}

    steps:
      - name: Download ZIP from Windows job
        uses: actions/download-artifact@v4
        with:
          name: drive-upload-zip
          path: ./output

      - name: Get ZIP filename
        id: zipname
        run: |
          FILE=$(ls ./output/*.zip 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No ZIP file found, exiting."
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_OUTPUT

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}   # base64 encoded JSON
          filename: ${{ steps.zipname.outputs.FILE }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "false"
