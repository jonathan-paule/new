name: Test Rclone Upload to Google Drive

on:
  workflow_dispatch:    # ← manual trigger for testing

jobs:
  upload-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
          Expand-Archive -Path "rclone.zip" -DestinationPath "rclone_dir" -Force
          $rcloneExe = Get-ChildItem -Recurse -Filter "rclone.exe" -Path "rclone_dir" | Select-Object -First 1
          Copy-Item $rcloneExe.FullName -Destination "rclone.exe"
          echo "✅ rclone installed"

      - name: Verify rclone installed
        shell: bash
        run: |
          ./rclone.exe --version

      - name: Configure rclone
        shell: bash
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf
          echo "✅ rclone configured"
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}

      - name: Verify rclone can connect to Drive
        shell: bash
        run: |
          ./rclone.exe ls gdrive:
          echo "✅ connected to Google Drive"

      - name: Create folder in Google Drive
        shell: bash
        run: |
          ./rclone.exe mkdir "gdrive:Trackright-test-demo"
          echo "✅ folder created"

      - name: Upload zip to Google Drive
        shell: bash
        run: |
          echo "Uploading test.zip..."
          ./rclone.exe copy "trackright.zip" "gdrive:Trackright-test-demo/"
          echo "✅ upload complete"

      - name: Verify upload
        shell: bash
        run: |
          echo "Files in Trackright folder:"
          ./rclone.exe ls "gdrive:Trackright-test-demo/"
